services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: appapi_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: app_central
      DB_USERNAME: appapi
      DB_PASSWORD: secret
      TENANT_DB_PREFIX: app_
      CENTRAL_DOMAINS: localhost,127.0.0.1
    networks:
      - appapi_net

  db:
    image: postgres:16
    container_name: appapi_db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: app_central
      POSTGRES_USER: appapi
      POSTGRES_PASSWORD: secret
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./docker/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U appapi -d app_central"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - appapi_net

networks:
  appapi_net:
    driver: bridge

volumes:
  db_data:
  vendor_data:
