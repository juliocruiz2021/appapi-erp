services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: appapi_app
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www
      - vendor_data:/var/www/vendor
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      DB_HOST: db
      DB_PORT: 3306
      DB_DATABASE: app_central
      DB_USERNAME: appapi
      DB_PASSWORD: secret
      TENANT_DB_PREFIX: app_
      CENTRAL_DOMAINS: localhost,127.0.0.1
    networks:
      - appapi_net

  db:
    image: mysql:8.0
    container_name: appapi_db
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: rootsecret
      MYSQL_DATABASE: app_central
      MYSQL_USER: appapi
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-prootsecret"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - appapi_net

networks:
  appapi_net:
    driver: bridge

volumes:
  db_data:
  vendor_data:
